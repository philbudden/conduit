# Speedtest exporter - measures download/upload speed and latency via Speedtest.net
# Source: https://github.com/MiguelNdeCarvalho/speedtest-exporter
# Image: ghcr.io/miguelndecarvalho/speedtest-exporter v3.5.4
# Port: 9798 (matches Prometheus scrape config)
# WARNING: Each scrape triggers a full speedtest (~100-500MB). Prometheus is
# configured to scrape this at 60m intervals (~500MB/day bandwidth usage).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: speedtest-exporter
  namespace: monitoring
  labels:
    app: speedtest-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: speedtest-exporter
  template:
    metadata:
      labels:
        app: speedtest-exporter
    spec:
      containers:
        - name: speedtest-exporter
          image: ghcr.io/miguelndecarvalho/speedtest-exporter:v3.5.4
          ports:
            - name: http
              containerPort: 9798
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          livenessProbe:
            tcpSocket:
              port: 9798
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            tcpSocket:
              port: 9798
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: speedtest-exporter
  namespace: monitoring
  labels:
    app: speedtest-exporter
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9798
      targetPort: 9798
      protocol: TCP
  selector:
    app: speedtest-exporter
